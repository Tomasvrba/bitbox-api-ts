name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/cache@v4
        with:
          path: test/simulators
          key: ${{ runner.os }}-bb02sim-${{ hashFiles('test/simulators.json') }}
      - run: ./ci.sh
        env:
          CI: 'true'
